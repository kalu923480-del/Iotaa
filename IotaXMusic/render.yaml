# ═══════════════════════════════════════════════════════════════════════════
# IOTA MUSIC BOT — standalone Render Blueprint (separate account from iota)
# ═══════════════════════════════════════════════════════════════════════════
# Use this file with a SEPARATE Render account (not shared with economy bot).
#
# Option A — Blueprint:
#   Render → New → Blueprint → repo → Root Directory: IotaXMusic
#
# Option B — Manual Web Service (recommended for Docker):
#   Root Directory: IotaXMusic
#   Environment: Docker
#   Dockerfile path: ./Dockerfile
#   Health check: /health
#
# Independent of iota/ economy bot. Lower load = one bot per free instance.
# ═══════════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: iota-music
    runtime: docker
    plan: free
    region: oregon
    branch: main
    # When Root Directory = IotaXMusic, do NOT set rootDir.
    # dockerfilePath is relative to that root:
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: MONGO_DB_URI
        sync: false
      - key: LOGGER_ID
        sync: false
      - key: COOKIE_URL
        sync: false
      - key: BOT_USERNAME
        value: Iotamusicbot
      - key: STRING2
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
