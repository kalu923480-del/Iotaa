# ═══════════════════════════════════════════════════════════════════════════
# IOTA MUSIC BOT — standalone Render Blueprint (separate account from iota)
# ═══════════════════════════════════════════════════════════════════════════
# Root Directory on Render MUST be: IotaXMusic
#
# Option A — Blueprint:
#   Render → New → Blueprint → repo → Root Directory: IotaXMusic
#
# Option B — Manual Web Service (recommended):
#   Root Directory: IotaXMusic
#   Environment: Docker
#   Dockerfile path: ./Dockerfile
#   Health check: /health
#
# 24/7 free: /health + self-ping every 5 min (RENDER_EXTERNAL_URL auto).
# Independent of iota/ economy bot — use a SEPARATE Render account.
# ═══════════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: iota-music
    runtime: docker
    plan: free
    region: oregon
    branch: main
    # When Root Directory = IotaXMusic, paths are relative to that folder:
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: PYTHONUNBUFFERED
        value: "1"
      # Required
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: MONGO_DB_URI
        sync: false
      # Recommended
      - key: LOGGER_ID
        value: "0"
      - key: BOT_USERNAME
        value: Iotamusicbot
      # Cookies: COOKIE_URL (raw paste) OR Render Secret File cookies.txt
      - key: COOKIE_URL
        sync: false
      - key: COOKIE_FILE
        value: /etc/secrets/cookies.txt
      # After first deploy, optional explicit keep-alive if needed:
      # KEEPALIVE_URL=https://iota-music-xxxx.onrender.com
      - key: KEEPALIVE_URL
        sync: false
      # Optional extras
      - key: STRING2
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: OPENROUTER_KEY
        sync: false
      - key: SUPPORT_CHAT
        value: https://t.me/samvadacha_chat
      - key: SUPPORT_CHANNEL
        value: https://t.me/IotaUpdates
