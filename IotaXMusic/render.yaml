# Render blueprint — Iota Music Bot (24/7 free Web Service)
# Docs: https://render.com/docs/blueprint-spec
#
# Use Docker so ffmpeg + deno ship correctly for YouTube playback.
# Free web services sleep after ~15m idle — the bot self-pings /health
# every 5 minutes so it stays awake.

services:
  - type: web
    name: iota-music
    runtime: docker
    plan: free
    region: oregon
    branch: main
    rootDir: IotaXMusic
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PORT
        value: "8080"
      # ── Required secrets (set real values in Render dashboard) ──
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: MONGO_DB_URI
        sync: false
      # Log group ID (negative). 0 = disable log features
      - key: LOGGER_ID
        sync: false
      # Raw Pastebin/Batbin URL to Netscape youtube cookies.txt
      - key: COOKIE_URL
        sync: false
      - key: BOT_USERNAME
        value: Iotamusicbot
      # Optional
      - key: STRING2
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
