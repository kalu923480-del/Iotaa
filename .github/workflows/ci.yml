name: Iota CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r iota/requirements.txt
          pip install flake8

      - name: Compile-check all modules
        run: |
          cd iota
          python -m compileall -q handlers utils bot.py

      - name: Lint (flake8)
        run: |
          cd iota
          flake8 --select=E9,F63,F7,F82,F401,F811,F821 --max-line-length=200 handlers utils bot.py

      - name: Run unit tests
        env:
          BOT_TOKEN: dummy
          MONGO_PASS: dummy
          OWNER_ID: "1"
        run: |
          cd iota
          python -m unittest discover -s tests -t . -v
