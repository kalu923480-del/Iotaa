# ═══════════════════════════════════════════════════════════════════════════
# IOTA ECONOMY / GAMES BOT — standalone Render Blueprint
# ═══════════════════════════════════════════════════════════════════════════
# Use this file with a SEPARATE Render account (not shared with music bot).
#
# Option A — Blueprint (Root Directory = iota):
#   Render → New → Blueprint → repo → set Root Directory to: iota
#   (or open blueprint from path iota/render.yaml)
#
# Option B — Manual Web Service:
#   Root Directory: iota
#   Build: pip install -r requirements.txt
#   Start: sh start.sh
#   Health: /health
#
# This service is INDEPENDENT of IotaXMusic. Deploy music on another account.
# ═══════════════════════════════════════════════════════════════════════════

services:
  - type: web
    name: iota-bot
    runtime: python
    plan: free
    region: oregon
    branch: main
    # When this YAML is used with Root Directory = iota, do NOT set rootDir.
    # When used from monorepo root Blueprint, uncomment:
    # rootDir: iota
    buildCommand: pip install -U pip && pip install -r requirements.txt && python3 -c "from utils.font_manager import ensure_fonts; ensure_fonts()"
    startCommand: sh start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PORT
        value: "8080"
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: OWNER_USERNAME
        sync: false
      - key: MONGO_URI
        sync: false
      # After first deploy: https://YOUR-iota-bot.onrender.com
      - key: WEBAPP_BASE_URL
        sync: false
      - key: BOT_USERNAME
        value: Its_iotabot
      - key: BOT_NAME
        value: Iota
      - key: GROQ_API_KEYS
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GIPHY_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: OPENROUTER_API_KEYS
        sync: false
      - key: UPDATE_CHANNEL_USERNAME
        sync: false
