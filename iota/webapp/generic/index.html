<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Iota Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --stage: #0f1220; --panel: #171b2e; --text: #f0ece0;
      --dim: #9aa0bd; --amber: #ffb648; --accent: #6c7bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--stage); color: var(--text);
      font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 24px;
    }
    .panel {
      background: var(--panel); border: 1px solid #2a2f4a; border-radius: 16px;
      padding: 20px; width: 100%; max-width: 420px; box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 20px; letter-spacing: .5px; }
    .sub { color: var(--dim); font-size: 14px; margin-bottom: 16px; }
    button {
      width: 100%; padding: 12px; border: 0; border-radius: 12px;
      background: var(--amber); color: #1a1205; font-weight: 700; font-size: 15px;
      cursor: pointer; margin-top: 8px;
    }
    button:active { transform: translateY(1px); }
    .out { margin-top: 16px; font-size: 14px; color: var(--dim); min-height: 20px; }
    code { color: var(--amber); }
  </style>
</head>
<body>
  <div class="panel">
    <h1>🎮 Iota Mini App</h1>
    <div class="sub">Generic skeleton — reuse for any game.</div>
    <div id="who">Connecting…</div>
    <button id="act">Do something</button>
    <div class="out" id="out"></div>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    const who = document.getElementById('who');
    const out = document.getElementById('out');
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
      who.textContent = 'Logged in as ' + (tg.initDataUnsafe.user.first_name || 'Player');
    } else {
      who.textContent = 'Not authenticated';
    }
    document.getElementById('act').onclick = () => {
      out.textContent = 'Action dispatched at ' + new Date().toLocaleTimeString();
      // A real game would call your /api/... endpoints here, then
      // optionally tg.sendData(...) to report the result back to the chat.
      if (tg.sendData) tg.sendData(JSON.stringify({ ok: true, t: Date.now() }));
    };
  </script>
</body>
</html>
