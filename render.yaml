# ═══════════════════════════════════════════════════════════════════════════
# MONOREPO NOTE — bots are SEPARATE (do not deploy both from root)
# ═══════════════════════════════════════════════════════════════════════════
#
# Load kam rakhne ke liye har bot ALAG Render account pe chalao:
#
#   Account A (economy/games):
#     Root Directory = iota
#     Blueprint / config  → iota/render.yaml
#     Guide              → iota/DEPLOY.md
#
#   Account B (music VC):
#     Root Directory = IotaXMusic
#     Blueprint / config  → IotaXMusic/render.yaml
#     Guide              → IotaXMusic/DEPLOY.md
#
# Overview of both: DEPLOY.md (repo root)
#
# This root render.yaml intentionally has NO services so a root Blueprint
# does not spawn both bots on one account by mistake.
# ═══════════════════════════════════════════════════════════════════════════

services: []
